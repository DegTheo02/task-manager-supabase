name: Generate repomix output

on:
  workflow_dispatch:

jobs:
  repomix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx --yes repomix --ignore "src/OldFiles/**"
      - uses: actions/upload-artifact@v4
        with:
          name: repomix-output
          path: repomix-output.xml
